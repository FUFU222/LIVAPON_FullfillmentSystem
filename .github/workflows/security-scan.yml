name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly: Monday 03:23 JST.
    - cron: '23 18 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # osv-scanner v2.3.6
  OSV_SCANNER_IMAGE: ghcr.io/google/osv-scanner@sha256:2e07e642463100474fc5e214b66e6beccbd6bfa63dd3fbf047b3f755e78a6cfe
  # gitleaks v8.30.1
  GITLEAKS_IMAGE: zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
  # Trivy v0.69.3
  TRIVY_IMAGE: ghcr.io/aquasecurity/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
  # OWASP ZAP 2.16.1
  ZAP_IMAGE: zaproxy/zap-stable@sha256:7840969c7c9fead565bf9734b12f49f6886db90b1d35b1f74d79710bbd081dab
  SEMGREP_VERSION: '1.161.0'

jobs:
  quick-security:
    name: Quick security checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit all dependencies
        run: npm audit --audit-level=high

      - name: OSV dependency scan
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}:/src:ro" \
            "${OSV_SCANNER_IMAGE}" \
            scan source -r /src \
            --experimental-exclude node_modules \
            --experimental-exclude .next \
            --experimental-exclude .tmp \
            --experimental-exclude security-reports \
            --experimental-exclude security-scan-artifacts

      - name: Gitleaks secret scan
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}:/repo:ro" \
            -w /repo \
            "${GITLEAKS_IMAGE}" \
            git --redact --no-banner --log-level warn .

      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check "semgrep==${SEMGREP_VERSION}"

      - name: Semgrep blocking rules
        run: |
          set -euo pipefail
          semgrep scan \
            --config p/default \
            --metrics off \
            --severity ERROR \
            --exclude node_modules \
            --exclude .next \
            --exclude .tmp \
            --exclude security-reports \
            --exclude security-scan-artifacts \
            .

  weekly-security:
    name: Weekly deep security checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      ZAP_TARGET: ${{ vars.SECURITY_SCAN_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan
        run: |
          set -euo pipefail
          mkdir -p .trivy-cache
          docker run --rm \
            -v "${PWD}:/repo:ro" \
            -v "${PWD}/.trivy-cache:/root/.cache:rw" \
            "${TRIVY_IMAGE}" \
            fs /repo \
            --scanners vuln,misconfig,secret \
            --skip-dirs node_modules \
            --skip-dirs .next \
            --skip-dirs .tmp \
            --skip-dirs security-reports \
            --skip-dirs security-scan-artifacts \
            --severity HIGH,CRITICAL \
            --exit-code 1

      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check "semgrep==${SEMGREP_VERSION}"

      - name: Semgrep full report
        run: |
          set -euo pipefail
          mkdir -p security-scan-artifacts
          semgrep scan \
            --config p/default \
            --metrics off \
            --exclude node_modules \
            --exclude .next \
            --exclude .tmp \
            --exclude security-reports \
            --exclude security-scan-artifacts \
            --json \
            -o security-scan-artifacts/semgrep-full.json \
            . || true

          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('security-scan-artifacts/semgrep-full.json', 'utf8'));
          const counts = {};
          for (const result of report.results || []) {
            const severity = (result.extra?.severity || 'UNKNOWN').toUpperCase();
            counts[severity] = (counts[severity] || 0) + 1;
          }
          fs.writeFileSync('security-scan-artifacts/semgrep-summary.json', `${JSON.stringify({
            findingCount: report.results?.length || 0,
            bySeverity: counts
          }, null, 2)}\n`);
          NODE

      - name: ZAP baseline scan
        run: |
          set -euo pipefail
          if [ -z "${ZAP_TARGET:-}" ]; then
            echo "SECURITY_SCAN_BASE_URL is not configured; skipping ZAP baseline."
            exit 0
          fi

          mkdir -p security-scan-artifacts/zap
          docker run --rm \
            -v "${PWD}/security-scan-artifacts/zap:/zap/wrk:rw" \
            "${ZAP_IMAGE}" \
            zap-baseline.py \
            -t "${ZAP_TARGET}" \
            -I \
            -r zap-report.html \
            -J zap-report.json \
            -w zap-report.md

      - name: Upload security scan artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: weekly-security-scan
          path: security-scan-artifacts/
          if-no-files-found: ignore
          retention-days: 14
